services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://host.docker.internal:8000/api/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - .:/app
      - node-modules:/app/node_modules

volumes:
  node-modules:
